---
name: Generate ASCII art

on: 
  workflow_dispatch:  

jobs:
    build-job-1:
        runs-on: ubuntu-latest

        steps:
          - name: Install Cowsay program
            run: sudo apt install cowsay -y

          - name: Execute Cowsay CMD
            run: cowsay -f dragon "${{ github.event.inputs.message }}" > dragon.txt

          - name: Upload Artifact  
            uses: actions/upload-artifact@v4
            with:
                name: dragon.txt-file
                path: dragon.txt

    test-job-2:
        runs-on: ubuntu-latest
        needs: build-job-1

        steps:
            - name: Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: dragon.txt-file

            - name: Test file exists
              run: ls -l | grep dragon.txt

    deploy-job-3:
        runs-on: ubuntu-latest
        needs: test-job-2

        steps:

            - name: Download Artifact
              uses: actions/download-artifact@v8
              with:
                name: dragon.txt-file

            - name: Read File
              run: cat dragon.txt

            - name: Deploy
              run: echo "Deploying......."
