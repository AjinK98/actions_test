---
name: Generate ASCII art

on: push

jobs:
    build-job-1:
        runs-on: ubuntu-latest

        steps:
          - name: Install Cowsay program
            run: sudo apt install cowsay -y

          - name: Execute Cowsay CMD
            run: cowsay -f dragon "Grrr......" > dragon.txt

          - name: Sleep for 10 seconds
            run: sleep 10

    test-job-2:
        runs-on: ubuntu-latest
        needs: build-job-1

        steps:
            - name: Test file exists
              run: grep -i "dragon" dragon.txt
            
            - name: Sleep for 10 seconds
              run: sleep 10

    deploy-job-3:
        runs-on: ubuntu-latest
        needs: test-job-2

        steps:
            - name: Read File
              run: cat dragon.txt

            - name: Deploy
              run: echo "Deploying......."
