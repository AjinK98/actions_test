---
name: Matrix Configuration
on: 
  push:
  workflow_dispatch:

jobs:
  deploy:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-22.04]
        images: [hello-world, alpine]
        exclude:
          - os: windows-latest
            images: alpine

        include:
          - os: ubuntu-22.04
            images: amd64/alpine

    runs-on: ${{ matrix.os }} 
    steps:
      - name: Echo Docker Details - ${{ matrix.os }}
        run: docker info
     
      - name: Run Images - ${{ matrix.images }}
        run: docker run ${{ matrix.images }}
  
